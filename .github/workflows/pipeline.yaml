name: Deploy to S3

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ aws.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ aws.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Upload index.html to S3
        run: |
          aws s3 cp index.html s3://${{ aws.S3_BUCKET_NAME }}/index.html
